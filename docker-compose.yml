services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: afripay-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_INTERNAL_PORT:-5432}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: ${HEALTH_CHECK_INTERVAL:-30s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-10s}
      retries: ${HEALTH_CHECK_RETRIES:-5}
    networks:
      - afripay-network
    restart: unless-stopped

  # Node.js Application
  app:
    build: .
    container_name: afripay-app
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PORT: ${APP_INTERNAL_PORT:-3000}
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:${APP_INTERNAL_PORT:-3000}"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:${APP_INTERNAL_PORT:-3000}/health',(r)=>{process.exit(r.statusCode===200?0:1)})"]
      interval: ${HEALTH_CHECK_INTERVAL:-30s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-3s}
      retries: ${HEALTH_CHECK_RETRIES:-3}
    networks:
      - afripay-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: afripay-nginx
    ports:
      - "${NGINX_PORT:-8080}:${NGINX_INTERNAL_PORT:-80}"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - afripay-network
    restart: unless-stopped

networks:
  afripay-network:
    driver: bridge

volumes:
  postgres_data:
